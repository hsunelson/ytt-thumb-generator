name: Deploy to GitHub Pages

# Publishes the static export to GitHub Pages.
# One-time setup: repo Settings → Pages → Build and deployment → Source =
# "GitHub Actions".
#
# Triggers on pushes to main and on manual dispatch. To deploy from a different
# branch (e.g. while the work lives on a feature branch), add it under `branches`
# or run the workflow manually from that branch via the Actions tab.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build static export (under the project-page subpath)
        run: npm run build
        env:
          # GitHub project page is served at /<repo>/.
          NEXT_PUBLIC_BASE_PATH: /ytt-thumb-generator
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
